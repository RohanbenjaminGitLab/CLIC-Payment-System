services:
  - type: web
    name: clic-campus-api
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAME_SITE
        value: none
  - type: static
    name: clic-campus-client
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html